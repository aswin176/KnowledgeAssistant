services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DEBUG: "false"
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - upload_data:/app/uploads
      - log_data:/app/logs
    depends_on:
      - neo4j
      - redis
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
    depends_on:
      - backend
    restart: unless-stopped

  telegram:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - telegram

volumes:
  neo4j_data:
  redis_data:
  upload_data:
  log_data:
